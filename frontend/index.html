<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银行</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scene">
        <div class="orb o1"></div>
        <div class="orb o2"></div>
        <div class="orb o3"></div>
        <div class="orb o4"></div>
    </div>

    <div class="layout">

        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-head">
                <div class="brand">
                    <div class="brand-avatar">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="4.5" y="4.5" width="15" height="15" rx="3.2" stroke="#fff" stroke-width="1.5"/>
                            <path d="M12 4.8v14.4M4.8 12h14.4" stroke="#fff" stroke-width="1.5"/>
                            <circle cx="12" cy="12" r="1.6" fill="#fff"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <span class="brand-name">银行</span>
                        <span class="brand-sub">智能客服</span>
                    </div>
                </div>
                <button class="ghost-btn theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">
                    <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <svg id="iconSun"  width="16" height="16" viewBox="0 0 24 24" fill="none" style="display:none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
            </div>

            <button class="new-chat-btn" onclick="newChat()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
                新对话
            </button>

            <div class="conv-section-label">历史对话</div>
            <div class="conv-list" id="convList"></div>

            <div class="sidebar-foot">
                <span class="powered-by">Powered by Dify</span>
            </div>
        </aside>

        <!-- 遮罩（移动端） -->
        <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

        <!-- 主聊天区 -->
        <main class="main">
            <div class="chat-panel">

                <header class="chat-header">
                    <button class="ghost-btn" onclick="toggleSidebar()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <div class="header-mid">
                        <span class="online-ring"></span>
                        <span class="header-title" id="chatTitle">新对话</span>
                    </div>
                    <div style="width:36px"></div>
                </header>

                <div class="messages" id="messages"></div>

                <div class="input-area">
                    <div class="input-shell" id="inputShell">
                        <textarea
                            id="userInput"
                            placeholder="有什么想问的？"
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"
                                    stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Enter 发送 · Shift+Enter 换行</p>
                </div>

            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
