    - data:
        code: "import re\n\ndef main(name, card, phone, s_name, s_card, s_phone, query):\n\
          \    q = query or \"\"\n\n    # 正则兜底\n    r_phone = re.search(r\"1[3-9]\\\
          d{9}\", q)\n    r_name  = re.search(r\"(?:我叫|我是|姓名[：:]?)\\s*([\\u4e00-\\\
          u9fa5]{2,4})\", q)\n    q2 = re.sub(r\"1[3-9]\\d{9}\", \"\", q)        \
          \      # 先去掉手机号\n    r_card  = re.search(r\"(?<!\\d)(\\d{4})(?!\\d)\", q2)\
          \ # 再找独立4位数\n\n    e_name  = (name or \"\").strip()\n    e_card  = (card\
          \ or \"\").strip()\n    e_phone = (phone or \"\").strip()\n\n    # 优先级：本轮提取器\
          \ → 本轮正则 → 已存会话变量\n    m_name  = e_name  or (r_name.group(1)  if r_name\
          \  else \"\") or (s_name or \"\").strip()\n    m_card  = e_card  or (r_card.group(1)\
          \  if r_card  else \"\") or (s_card or \"\").strip()\n    m_phone = e_phone\
          \ or (r_phone.group(0) if r_phone else \"\") or (s_phone or \"\").strip()\n\
          \n    filled = sum(1 for v in [m_name, m_card, m_phone] if v)\n    stage\
          \ = \"complete\" if filled == 3 else (\"empty\" if filled == 0 else \"partial\"\
          )\n    return {\"stage\": stage, \"name\": m_name, \"card\": m_card, \"\
          phone\": m_phone}"
